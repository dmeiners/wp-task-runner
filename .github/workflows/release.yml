name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build static binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -a -ldflags="-s -w -extldflags '-static'" -trimpath \
            -o wp-task-runner ./cmd/daemon

      - name: Make binary executable
        run: chmod +x wp-task-runner

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Create .deb package
        run: |
          RAW_VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=${RAW_VERSION#v}
          echo "Building deb with cleaned version: $CLEAN_VERSION"

          VERSION=$CLEAN_VERSION nfpm package \
            --packager deb \
            --config nfpm.yaml \
            --target wp-task-runner_${CLEAN_VERSION}_amd64.deb

      - name: Create tar.gz archive
        run: |
          RAW_VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=${RAW_VERSION#v}
          tar -czf wp-task-runner-${CLEAN_VERSION}-linux-amd64.tar.gz wp-task-runner

      - name: Generate SHA256 checksums
        run: |
          RAW_VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=${RAW_VERSION#v}
          {
            echo "# SHA256 checksums for wp-task-runner ${CLEAN_VERSION}"
            sha256sum wp-task-runner_${CLEAN_VERSION}_amd64.deb
            sha256sum wp-task-runner-${CLEAN_VERSION}-linux-amd64.tar.gz
          } > wp-task-runner_${CLEAN_VERSION}_SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wp-task-runner-packages
          path: |
            wp-task-runner_*.deb
            wp-task-runner-*-linux-amd64.tar.gz
            wp-task-runner_*_SHA256SUMS.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wp-task-runner-packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wp-task-runner_*.deb
            wp-task-runner-*-linux-amd64.tar.gz
            wp-task-runner_*_SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
